<!DOCTYPE html>
<html>
<head>
    <title>CityFix AI - Submit Complaint</title>
    <link rel="stylesheet" href="css/admin.css">
    <link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>
</head>
<body>

<div class="sidebar">

    <h2>CityFix AI</h2>

    <ul>

        <li onclick="showSection('newComplaintSection')">
            New Complaint
        </li>

        <li onclick="
showSection('myComplaintsSection');
loadMyComplaints();
">
    My Complaints
</li>

        <li onclick="showSection('profileSection')">
            Profile
        </li>

        <li onclick="logout()">
            Logout
        </li>

    </ul>

</div>

<div class="main">

    <!-- Dashboard Cards -->

    <div class="cards">

        <div class="card">
            <h2 id="totalComplaints">0</h2>
            <p>Total Complaints</p>
        </div>

        <div class="card">
            <h2 id="pendingComplaints">0</h2>
            <p>Pending</p>
        </div>

        <div class="card">
            <h2 id="progressComplaints">0</h2>
            <p>In Progress</p>
        </div>

        <div class="card">
            <h2 id="resolvedComplaints">0</h2>
            <p>Resolved</p>
        </div>

    </div>

    <br>

    <!-- NEW COMPLAINT -->

    <div
    id="newComplaintSection"
    class="complaint-container"
>

    <h1>Submit Complaint</h1>

    <form id="complaintForm">

        <div class="form-group">
            <label>Complaint Title</label>
            <input
                type="text"
                id="title"
                placeholder="Enter Complaint Title"
                required
            >
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea
                id="description"
                placeholder="Describe the issue"
                required
            ></textarea>
        </div>

        <div class="form-group">
            <label>Category</label>

            <select id="category">

                <option value="Road">
                    Road Issue
                </option>

                <option value="Water">
                    Water Leakage
                </option>

                <option value="Garbage">
                    Garbage
                </option>

                <option value="Street Light">
                    Street Light
                </option>

                <option value="Electricity">
                    Electricity
                </option>

            </select>
        </div>

        <div class="form-group">

    <label>Location</label>

    <input
        type="text"
        id="location"
        placeholder="Enter Location or Use GPS"
    >

    <br><br>
    

    <button
        type="button"
        class="gps-btn"
        onclick="getLocation()"
    >
        📍 Detect My Location
    </button>

    

</div>

<div
    id="map"
    style="
        height:350px;
        border-radius:10px;
        margin-top:20px;
    "
></div>

        <div class="form-group">

    <label>Complaint Photo</label>

    <div class="photo-options">

        <button
            type="button"
            class="photo-btn upload-btn"
            onclick="document.getElementById('image').click()"
        >
            📁 Upload From Gallery
        </button>

        <button
    type="button"
    class="photo-btn camera-btn"
    onclick="openCameraModal()"
>
    📸 Capture Live Photo
</button>

    </div>

    <input
        type="file"
        id="image"
        accept="image/*"
        style="display:none"
        onchange="previewImage(event)"
    >

    <input
        type="file"
        id="cameraImage"
        accept="image/*"
        capture="environment"
        style="display:none"
        onchange="previewImage(event)"
    >

</div>

<br>

<img
    id="preview"
    style="
        display:none;
        width:300px;
        border-radius:12px;
        margin:auto;
    "
>


        <button
            type="submit"
            class="submit-btn"
        >
            Submit Complaint
        </button>

    </form>

</div>

    <!-- MY COMPLAINTS -->

    <div
        id="myComplaintsSection"
        style="display:none;"
    >

        <h1>
            My Complaints
        </h1>

        <div id="myComplaints"></div>

        
        <input
    type="text"
    id="complaintSearch"
    placeholder="Search Complaint"
>

<button onclick="searchMyComplaints()">
    Search
</button>

    </div>

    <!-- PROFILE -->

    <div
        id="profileSection"
        style="display:none;"
    >

        <div class="card">

            <h2 id="citizenName">
                Citizen
            </h2>

            <p>
                Complaint Tracking Dashboard
            </p>

        </div>

    </div>

</div>


<script>

    let map;
let marker;

    function logout(){

    localStorage.removeItem("token");

    window.location.href = "login.html";
}


    if(!localStorage.getItem("token")){
    window.location.href = "login.html";
}

document.getElementById("complaintForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const formData = new FormData();
    const location =
document.getElementById(
    "location"
).value.trim();

if(location === ""){

    alert(
        "Please Select Location from GPS, Map or Enter Manually"
    );

    return;
}

formData.append(
    "title",
    document.getElementById("title").value
);

formData.append(
    "description",
    document.getElementById("description").value
);

formData.append(
    "category",
    document.getElementById("category").value
);

formData.append(
    "location",
    document.getElementById("location").value
);

const uploadImage =
document.getElementById("image").files[0];

if(!uploadImage && !capturedBlob){

    alert(
        "Please Upload or Capture a Photo"
    );

    return;
}

formData.append(
    "image",
    uploadImage || capturedBlob
);


formData.append(
    "citizenId",
    localStorage.getItem("userId")
);

const response = await fetch(
    "http://localhost:5000/api/complaints/create",
    {
        method: "POST",
        body: formData
    }
);
    const data = await response.json();

    alert(data.message);

});

function showSection(sectionId){

    document.getElementById(
        "newComplaintSection"
    ).style.display = "none";

    document.getElementById(
        "myComplaintsSection"
    ).style.display = "none";

    document.getElementById(
        "profileSection"
    ).style.display = "none";

    document.getElementById(
        sectionId
    ).style.display = "block";
}

function previewImage(event){

    const preview =
    document.getElementById(
        "preview"
    );

    preview.src =
    URL.createObjectURL(
        event.target.files[0]
    );

    preview.style.display =
    "block";
}

function getLocation(){

    navigator.geolocation.getCurrentPosition(

        function(position){

            const lat =
            position.coords.latitude;

            const lng =
            position.coords.longitude;

            document.getElementById(
                "location"
            ).value =
            lat + ", " + lng;

            loadMap(
                lat,
                lng
            );
            getAddress(
    lat,
    lng
);
        },

        function(error){

            alert(
                "Unable to fetch location"
            );
        },

        {
            enableHighAccuracy:true,
            timeout:15000,
            maximumAge:0
        }
    );
}

function loadMap(
    lat,
    lng
){

    if(map){

        map.remove();
    }

    map = L.map(
        "map"
    ).setView(
        [lat,lng],
        16
    );

    L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
            attribution:
            "© OpenStreetMap"
        }
    ).addTo(map);

    marker = L.marker(
        [lat,lng],
        {
            draggable:true
        }
    ).addTo(map);

    marker.on(
        "dragend",
        function(){

            const pos =
            marker.getLatLng();

            getAddress(
    pos.lat,
    pos.lng
);
        }
    );

    map.on(
        "click",
        function(e){

            marker.setLatLng(
                e.latlng
            );

            getAddress(
    e.latlng.lat,
    e.latlng.lng
);
        }
    );
}

async function getAddress(
    lat,
    lng
){

    try{

        const response =
        await fetch(

`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`

        );

        const data =
        await response.json();

        document.getElementById(
            "location"
        ).value =
        data.display_name;

    }catch(error){

        console.log(error);

        document.getElementById(
            "location"
        ).value =
        lat + ", " + lng;
    }
}

async function loadCitizenDashboard(){

    const citizenId =
    localStorage.getItem(
        "userId"
    );

    const response =
    await fetch(
        `http://localhost:5000/api/complaints/citizen/${citizenId}`
    );

    const complaints =
    await response.json();

    document.getElementById(
        "totalComplaints"
    ).innerText =
    complaints.length;

    document.getElementById(
        "pendingComplaints"
    ).innerText =
    complaints.filter(
        c => c.status==="Pending"
    ).length;

    document.getElementById(
        "progressComplaints"
    ).innerText =
    complaints.filter(
        c => c.status==="In Progress"
    ).length;

    document.getElementById(
        "resolvedComplaints"
    ).innerText =
    complaints.filter(
        c => c.status==="Resolved"
    ).length;

    document.getElementById(
        "citizenName"
    ).innerText =
    localStorage.getItem(
        "name"
    );
}

async function loadMyComplaints(){

    const citizenId =
    localStorage.getItem(
        "userId"
    );

    const response =
    await fetch(
        `http://localhost:5000/api/complaints/citizen/${citizenId}`
    );

    const data =
    await response.json();

    let output = "";

    data.forEach(c=>{

        let color = "#f39c12";

        if(c.status==="Resolved"){
            color="#27ae60";
        }

        if(c.status==="In Progress"){
            color="#3498db";
        }

        output += `

        <div class="card">

            <h2>
                ${c.title}
            </h2>
            <p>
    <b>Ticket ID:</b>
    ${c.ticketId}
</p>

            <br>

            <img
src="http://localhost:5000/uploads/${c.image}"
width="250"
class="complaint-img"
onclick="openImage(this.src)"
>

            <br><br>

            <p>
                <b>Category:</b>
                ${c.category}
            </p>

            <p>
                <b>Location:</b>
                ${c.location}
            </p> <br>
            

    <p>

<b>Status:</b>

<span class="status-badge ${c.status.replace(/\s/g,'')}">

${c.status}

</span>

</p>


<div class="complaint-progress">

    <div class="step ${
        c.status === "Pending" ||
        c.status === "In Progress" ||
        c.status === "Resolved"
        ? "active"
        : ""
    }">
        <div class="circle">✓</div>
        <span>Submitted</span>
    </div>

    <div class="line ${
        c.assignedTo
        ? "active-line"
        : ""
    }"></div>

    <div class="step ${
        c.assignedTo
        ? "active"
        : ""
    }">
        <div class="circle">✓</div>
        <span>Assigned</span>
    </div>

    <div class="line ${
        c.status === "In Progress" ||
        c.status === "Resolved"
        ? "active-line"
        : ""
    }"></div>

    <div class="step ${
        c.status === "In Progress" ||
        c.status === "Resolved"
        ? "active"
        : ""
    }">
        <div class="circle">✓</div>
        <span>In Progress</span>
    </div>

    <div class="line ${
        c.status === "Resolved"
        ? "active-line"
        : ""
    }"></div>

    <div class="step ${
        c.status === "Resolved"
        ? "active"
        : ""
    }">
        <div class="circle">✓</div>
        <span>Resolved</span>
    </div>

</div>


            <p>
                <b>Priority:</b>
                ${c.priority}
            </p>

            <p>
                <b>Officer Remark:</b>
                ${c.remarks || "No Remarks"}
            </p>
            <div class="officer-info">

    <p>
        <b>Assigned Officer:</b>
        ${c.assignedTo ? c.assignedTo.name : "Not Assigned Yet"}
    </p>

    <p>
        <b>Officer Email:</b>
        ${c.assignedTo ? c.assignedTo.email : "-"}
    </p>

</div>

        </div>

        <br>
        `;
    });

    document.getElementById(
        "myComplaints"
    ).innerHTML = output;
}

function searchMyComplaints(){

    const search =
    document.getElementById(
        "complaintSearch"
    ).value.toLowerCase();

    const cards =
    document.querySelectorAll(
        "#myComplaints .card"
    );

    cards.forEach(card=>{

        if(
            card.innerText
            .toLowerCase()
            .includes(search)
        ){

            card.style.display =
            "block";

        }else{

            card.style.display =
            "none";
        }
    });
}

let stream;
let capturedBlob;

async function openCameraModal(){

    try{

        stream =
        await navigator
        .mediaDevices
        .getUserMedia({

            video:true

        });

        document.getElementById(
            "cameraModal"
        ).style.display =
        "block";

        document.getElementById(
            "video"
        ).srcObject =
        stream;

    }catch(error){

        alert(
            "Camera Permission Denied"
        );

        console.log(error);
    }
}

function closeCameraModal(){

    document.getElementById(
        "cameraModal"
    ).style.display =
    "none";

    if(stream){

        stream.getTracks()
        .forEach(track=>{

            track.stop();

        });
    }
}

function capturePhoto(){

    const video =
    document.getElementById(
        "video"
    );

    const canvas =
    document.getElementById(
        "canvas"
    );

    canvas.width =
    video.videoWidth;

    canvas.height =
    video.videoHeight;

    const ctx =
    canvas.getContext("2d");

    ctx.drawImage(
        video,
        0,
        0
    );

    canvas.toBlob(

        function(blob){

            capturedBlob =
            blob;

            document.getElementById(
                "preview"
            ).src =
            URL.createObjectURL(
                blob
            );

            document.getElementById(
                "preview"
            ).style.display =
                "block";

        },

        "image/jpeg",
        0.9
    );

    closeCameraModal();
}

function openImage(src){

    document.getElementById(
        "imageModal"
    ).style.display = "block";

    document.getElementById(
        "modalImage"
    ).src = src;
}

function closeImage(){

    document.getElementById(
        "imageModal"
    ).style.display = "none";
}

showSection(
    "newComplaintSection"
);

loadCitizenDashboard();

loadMap(
    28.6139,
    77.2090
);


</script>

<div id="cameraModal" class="camera-modal">

    <div class="camera-box">

        <span
            class="close-camera"
            onclick="closeCameraModal()"
        >
            &times;
        </span>

        <h2>Live Camera</h2>

        <video
            id="video"
            autoplay
            playsinline
        ></video>

        <br><br>

        <button
            onclick="capturePhoto()"
            class="submit-btn"
        >
            Capture Photo
        </button>

    </div>

</div>

<canvas
    id="canvas"
    style="display:none;"
></canvas>


<div id="imageModal" class="modal">

    <span
        class="close"
        onclick="closeImage()"
    >
        &times;
    </span>

    <img
        id="modalImage"
        class="modal-content"
    >

</div>


</body>
</html>
